<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống DST ESPORT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="registration-section" class="card">
            <h2>🎮 ĐĂNG KÝ THÔNG TIN QĐ DST ESPORT</h2>
            <form id="regForm">
                <input type="text" id="gameName" placeholder="Tên Game" required>
                <input type="text" id="gameId" placeholder="ID Game" required>
                <input type="text" id="zaloName" placeholder="Tên Zalo" required>
                <input type="tel" id="phone" placeholder="Số điện thoại" required>
                <button type="submit">GỬI ĐĂNG KÝ</button>
            </form>
            <p id="regStatus"></p>
        </div>

        <div id="login-section" class="card">
            <h3>🔐 Quản trị viên</h3>
            <input type="password" id="adminPassword" placeholder="Nhập mật khẩu...">
            <button onclick="handleAdminLogin()">VÀO TRANG QUẢN LÝ</button>
        </div>

        <div id="admin-section" class="card" style="display: none;">
            <h2>📊 DANH SÁCH ĐĂNG KÝ</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Tên Game</th><th>ID</th><th>Zalo</th><th>SĐT</th><th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody"></tbody>
                </table>
            </div>
            <button onclick="location.reload()" class="btn-back">THOÁT QUẢN LÝ</button>
        </div>
    </div>
    <script src="script.js"></script>

    <div id="admin-section" class="card" style="display: none;">
        <div id="admin-section" class="card" style="display: none;">
    <h2>📊 QUẢN LÝ ĐĂNG KÝ</h2>
    
    <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm tên, ID hoặc SĐT..." onkeyup="searchTable()" 
           style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:1px solid #555; background:#222; color:white;">
    
    <div class="table-container">
        <table id="adminTable">
            <thead>
                <tr>
                    <th>Tên Game</th><th>ID Game</th><th>Zalo</th><th>SĐT</th><th>Ngày đăng ký</th><th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>
    <button onclick="location.reload()" class="btn-back">THOÁT QUẢN LÝ</button>
</div>

           style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:1px solid #555; background:#222; color:white;">
    
    <div class="table-container">
        <table id="adminTable">
            <thead>
                <tr>
                    <th>Tên Game</th><th>ID Game</th><th>Zalo</th><th>SĐT</th><th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>
    <button onclick="location.reload()" class="btn-back">THOÁT QUẢN LÝ</button>
</div>

</body>
</html>
